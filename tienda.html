    .header {

      z-index: 999;
      background: #ffffff;

      display: flex;

    .header-nombre {

    .header-nombre strong {

    }

    .header-acciones {

    .buscador input {

      border-radius: 20px;
      border: 1.5px solid #c8a84b;
      font-size: 13px;
      width: 200px;
      outline: none;
      transition: border-color 0.2s;
    }

    .buscador input:focus {
      border-color: #0044aa;
    }

    .btn-carrito {
      background: linear-gradient(135deg, #0066cc, #0044aa);
      color: white;
      border: none;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s;
    }

    .btn-carrito:hover { transform: translateY(-1px); }

    .filtros {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 10px 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filtros span {
      font-size: 12px;
      color: #888;
      margin-right: 4px;
    }

    .filtro-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid #c8a84b;
      background: white;
      font-size: 12px;
      cursor: pointer;
      color: #444;
      transition: all 0.2s;
    }

    .filtro-btn:hover, .filtro-btn.activo {
      background: #0044aa;
      color: white;
      border-color: #0044aa;
    }

    .catalogo-wrapper {
      padding: 20px;
    }

    .sin-resultados {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 16px;
      display: none;
    }

    .catalogo {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .producto {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .producto:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.14);
    }

    .producto-img-wrap {
      position: relative;
      width: 100%;
      padding-top: 75%;
      background: #f0f0f0;
      cursor: pointer;
      overflow: hidden;
    }

    .producto-img-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .producto-img-wrap:hover img {

    }

    .img-placeholder {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      font-size: 12px;

    }

    .badge-oferta {

      color: white;
      font-size: 10px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 10px;
      z-index: 2;
    }

    .badge-agotado {

    .producto-info {

    .producto-precios {

    }

    .precio-tachado {

    .dias-oferta {

      border-radius: 8px;
      font-size: 12px;

      align-items: center;
      justify-content: center;

    .modal-overlay.abierto {

    .modal {

      width: 100%;

      overflow-y: auto;

    }

    .modal-cerrar {

      color: #666;

      font-weight: bold;

    .modal-nombre {

      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }

    .modal-btn-agregar:hover { opacity: 0.9; }
    .modal-btn-agregar:disabled { background: #ccc; cursor: not-allowed; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #0044aa;
      color: white;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: bold;
      z-index: 3000;
      transition: transform 0.3s ease;
      pointer-events: none;
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 16px;
      margin-top: 30px;
      font-size: 13px;
      line-height: 1.8;
    }

    @media (max-width: 900px) {
      .catalogo { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 680px) {
      .catalogo { grid-template-columns: repeat(2, 1fr); }
      .buscador input { width: 140px; }
    }

    @media (max-width: 420px) {
      .catalogo { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .catalogo-wrapper { padding: 12px; }
      .buscador input { width: 110px; }
      .header-nombre strong { font-size: 13px; }
    }
  </style>
</head>

    function cargarProductos() {
      const guardados = localStorage.getItem("em_productos");
      if (guardados) {
        try { return JSON.parse(guardados); }
        catch(e) {}
      }
      return PRODUCTOS_DEFAULT;
    }

    function diasRestantes(p) {
      if (!p.enOferta || !p.fechaInicioOferta) return 0;
      const inicio = new Date(p.fechaInicioOferta);
      const fin = new Date(inicio.getTime() + p.diasOferta * 86400000);
      const hoy = new Date();
      const diff = Math.ceil((fin - hoy) / 86400000);
      return diff > 0 ? diff : 0;
    }

    function cargarCarrito() {
      const c = localStorage.getItem("em_carrito");
      return c ? JSON.parse(c) : [];
    }

    function guardarCarrito(carrito) {
      localStorage.setItem("em_carrito", JSON.stringify(carrito));
      document.getElementById("contadorCarrito").textContent = carrito.reduce((s,i)=>s+i.cantidad,0);
    }

    function agregarAlCarrito(id) {
      const productos = cargarProductos();
      const p = productos.find(x => x.id === id);
      if (!p || p.stock === 0) return;
      const carrito = cargarCarrito();
      const existe = carrito.find(x => x.id === id);
      if (existe) { existe.cantidad++; }
      else { carrito.push({ id: p.id, nombre: p.nombre, precio: p.enOferta && diasRestantes(p)>0 ? p.precioOferta : p.precio, cantidad: 1, imagen: p.imagenes[0] || "" }); }
      guardarCarrito(carrito);
      mostrarToast("✅ " + p.nombre + " agregado al carrito");
    }

    function mostrarToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("visible");
      setTimeout(() => t.classList.remove("visible"), 2400);
    }

    let categoriaActiva = "Todos";
    let terminoBusqueda = "";

    function productosFiltrados() {
      const productos = cargarProductos();
      return productos.filter(p => {
        const catOk = categoriaActiva === "Todos" || p.categoria === categoriaActiva;
        const busOk = terminoBusqueda === "" ||
          p.nombre.toLowerCase().includes(terminoBusqueda.toLowerCase()) ||
          p.descCorta.toLowerCase().includes(terminoBusqueda.toLowerCase());
        return catOk && busOk;
      });
    }

    function renderFiltros() {
      const productos = cargarProductos();
      const categorias = [...new Set(productos.map(p => p.categoria))];
      const contenedor = document.getElementById("filtros");
      contenedor.innerHTML = '<span>Categoría:</span>';
      ["Todos", ...categorias].forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "filtro-btn" + (cat === categoriaActiva ? " activo" : "");
        btn.textContent = cat;
        btn.onclick = () => seleccionarCategoria(cat, btn);
        contenedor.appendChild(btn);
      });
    }

    function seleccionarCategoria(cat, b
