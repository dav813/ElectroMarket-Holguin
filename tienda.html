<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElectroMarket Holguín</title>

<style>
body { margin:0; font-family:Arial, sans-serif; background:#f3f3f3; }

/* HEADER */
.header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#131921;
  color:white;
  padding:10px;
  position:sticky;
  top:0;
  z-index:1000;
}
.logo { font-size:18px; font-weight:bold; }
.search { flex:1; margin:0 10px; }
.search input { width:100%; padding:8px; border-radius:4px; border:none; }
.cart { cursor:pointer; }

/* FILTROS */
.btn-filtro {
  width:100%;
  padding:10px;
  background:#ddd;
  border:none;
  cursor:pointer;
}
.filtros {
  background:white;
  padding:10px;
  display:none;
}
.filtros input {
  width:100%;
  padding:8px;
  margin:5px 0;
}

/* PRODUCTOS */
.productos {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}
.producto {
  background:white;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  position:relative;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.producto img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:6px;
}
.oferta-tag {
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:4px 6px;
  font-size:12px;
  border-radius:4px;
}

/* CARRITO */
.carrito-panel {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:white;
  border-left:2px solid #ccc;
  padding:10px;
  overflow:auto;
  display:none;
  z-index:2000;
}
.carrito-panel h3 { margin-top:0; }

/* MODAL PRODUCTO */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:3000;
}
.modal-content {
  background:white;
  padding:20px;
  width:90%;
  max-width:500px;
  border-radius:10px;
}

/* BOTÓN WHATSAPP */
.whatsapp-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:12px 18px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">ElectroMarket Holguín</div>
  <div class="search">
    <input type="text" id="busqueda" placeholder="Buscar productos...">
  </div>
  <div class="cart" onclick="toggleCarrito()">
    🛒 <span id="contador">0</span>
  </div>
</div>

<!-- FILTROS -->
<button class="btn-filtro" onclick="toggleFiltros()">☰ Filtros</button>
<div class="filtros" id="filtrosBox">
  <input type="text" id="filtroCategoria" placeholder="Categoría">
  <input type="number" id="precioMin" placeholder="Precio mínimo">
  <input type="number" id="precioMax" placeholder="Precio máximo">
  <button onclick="cargarProductos()">Aplicar filtros</button>
</div>

<!-- PRODUCTOS -->
<div class="productos" id="productos"></div>

<!-- CARRITO -->
<div class="carrito-panel" id="carritoPanel">
  <h3>Carrito</h3>
  <div id="carritoItems"></div>
  <h4>Total: $<span id="total">0</span></h4>
  <button onclick="vaciarCarrito()">Vaciar carrito</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- BOTÓN WHATSAPP -->
<a class="whatsapp-btn" href="https://wa.me/5351421460" target="_blank">💬 Ayuda</a>

<script>
// 🔹 CARGAR PRODUCTOS
function cargarProductos() {
  let productos = JSON.parse(localStorage.getItem("em_productos")) || [];
  let contenedor = document.getElementById("productos");
  contenedor.innerHTML = "";

  let texto = busqueda.value.toLowerCase();
  let categoria = filtroCategoria.value.toLowerCase();
  let min = parseFloat(precioMin.value) || 0;
  let max = parseFloat(precioMax.value) || Infinity;

  let filtrados = productos.filter(p =>
    p.nombre.toLowerCase().includes(texto) &&
    p.categoria.toLowerCase().includes(categoria) &&
    p.precio >= min &&
    p.precio <= max
  );

  if (filtrados.length === 0) {
    contenedor.innerHTML = "<p>No hay productos</p>";
    return;
  }

  filtrados.forEach(p => {
    let precioFinal = p.descuento>0 ? (p.precio - (p.precio*p.descuento/100)) : p.precio;

    contenedor.innerHTML += `
      <div class="producto">
        ${p.descuento>0 ? `<div class="oferta-tag">OFERTA 🔥</div>` : ""}
        <img src="${p.imagen || 'https://via.placeholder.com/150'}">
        <h4>${p.nombre}</h4>
        <p>${p.descCorta}</p>
        <p>
          ${p.descuento>0 
            ? `<span style="text-decoration:line-through">$${p.precio}</span> <b>$${precioFinal}</b>` 
            : `<b>$${p.precio}</b>`}
        </p>
        <button onclick='verProducto("${p.id}")'>Ver producto</button>
        <button onclick='agregarCarrito("${p.id}")'>Agregar al carrito</button>
      </div>
    `;
  });
}

// 🔹 VER PRODUCTO
function verProducto(id) {
  let productos = JSON.parse(localStorage.getItem("em_productos")) || [];
  let p = productos.find(x=>x.id===id);
  if(!p) return;

  let precioFinal = p.descuento>0 ? (p.precio - (p.precio*p.descuento/100)) : p.precio;

  modalContent.innerHTML = `
    <h2>${p.nombre}</h2>
    <img src="${p.imagen || 'https://via.placeholder.com/150'}" style="width:100%;border-radius:8px;">
    <p>${p.descLarga}</p>
    <h3>
      ${p.descuento>0 
        ? `<span style="text-decoration:line-through">$${p.precio}</span> <b>$${precioFinal}</b>` 
        : `<b>$${p.precio}</b>`}
    </h3>
    <button onclick='agregarCarrito("${p.id}")'>Agregar al carrito</button>
    <button onclick='cerrarModal()'>Cerrar</button>
  `;
  modal.style.display = "flex";
}
function cerrarModal(){ modal.style.display="none"; }

// 🔹 CARRITO
function getCarrito(){ return JSON.parse(localStorage.getItem("carrito")) || []; }
function setCarrito(c){ localStorage.setItem("carrito", JSON.stringify(c)); }

function agregarCarrito(id){
  let productos = JSON.parse(localStorage.getItem("em_productos")) || [];
  let p = productos.find(x=>x.id===id);
  if(!p) return;

  let c = getCarrito();
  c.push(p);
  setCarrito(c);
  actualizarCarrito();
}

function eliminarItem(i){
  let c = getCarrito();
  c.splice(i,1);
  setCarrito(c);
  actualizarCarrito();
}

function vaciarCarrito(){
  localStorage.removeItem("carrito");
  actualizarCarrito();
}

  cont.innerHTML = "";
