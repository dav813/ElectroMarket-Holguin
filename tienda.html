<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda - ElectroMarket Holguín</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* TODO TU CSS SE QUEDA IGUAL */
body { font-family: Arial, sans-serif; background:#e6e6e6; padding-top:62px; }
.catalogo { display:grid; grid-template-columns: repeat(4,1fr); gap:16px; padding:20px; }
.producto { background:white; padding:10px; border-radius:10px; }
</style>
</head>

<body>

<header>
  <h2>Tienda ElectroMarket</h2>
</header>

<p id="sinResultados" style="display:none;">No hay productos</p>

<div class="catalogo" id="catalogo"></div>

<script>

const PRODUCTOS_DEFAULT = [
  {
    id: "P001",
    nombre: "Televisor Samsung 32\"",
    categoria: "Televisores",
    precio: 250,
    descCorta: "Smart TV Full HD"
  }
];

/* =========================
   🔥 ARREGLO PRINCIPAL
   ========================= */

function cargarProductos() {
  const guardados = localStorage.getItem("em_productos");

  if (guardados) {
    try {
      return JSON.parse(guardados);
    } catch (e) {
      console.log("Error leyendo localStorage");
    }
  }

  return PRODUCTOS_DEFAULT;
}

/* ❌ ESTO FALTABA EN TU TIENDA */
function render() {
  const contenedor = document.getElementById("catalogo");

  const productos = cargarProductos();

  contenedor.innerHTML = "";

  if (!productos || productos.length === 0) {
    document.getElementById("sinResultados").style.display = "block";
    return;
  }

  document.getElementById("sinResultados").style.display = "none";

  productos.forEach(p => {
    contenedor.innerHTML += `
      <div class="producto">
        <h3>${p.nombre}</h3>
        <p>${p.descCorta || ""}</p>
        <b>$${p.precio}</b>
      </div>
    `;
  });
}

/* 🔥 CARGA AUTOMÁTICA */
render();

/* 🔥 ACTUALIZA SI VIENES DEL ADMIN */
window.addEventListener("storage", function(e) {
  if (e.key === "em_productos") {
    render();
  }
});

</script>

</body>
</html>
