<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElectroMarketHolguin</title>

<style>
body { margin:0; font-family:Arial; background:#f3f3f3; }

/* HEADER */
.header {
  display:flex;
  align-items:center;
  background:#131921;
  color:white;
  padding:10px;
}

.logo {
  font-size:18px;
  font-weight:bold;
}

.search {
  flex:1;
  margin:0 10px;
}

.search input {
  width:100%;
  padding:8px;
}

.cart {
  cursor:pointer;
}

/* FILTROS */
.filtros {
  background:white;
  padding:10px;
}

.filtros input {
  width:100%;
  padding:8px;
  margin:5px 0;
}

/* PRODUCTOS */
.productos {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.producto {
  background:white;
  padding:10px;
  border:1px solid #ddd;
}

.producto img {
  width:100%;
  height:150px;
  object-fit:cover;
}

/* BOTONES */
button {
  padding:8px;
  margin-top:5px;
  width:100%;
  cursor:pointer;
}

/* CARRITO */
.carrito-panel {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:white;
  border-left:2px solid #ccc;
  padding:10px;
  overflow:auto;
  display:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">ElectroMarketHolguin</div>

  <div class="search">
    <input type="text" id="busqueda" placeholder="Buscar productos...">
  </div>

  <div class="cart" onclick="toggleCarrito()">
    🛒 <span id="contador">0</span>
  </div>
</div>

<!-- FILTROS -->
<div class="filtros">
  <input type="text" id="filtroCategoria" placeholder="Categoría">
  <input type="number" id="precioMin" placeholder="Precio mínimo">
  <input type="number" id="precioMax" placeholder="Precio máximo">
  <button onclick="cargarProductos()">Filtrar</button>
</div>

<!-- PRODUCTOS -->
<div class="productos" id="productos"></div>

<!-- CARRITO -->
<div class="carrito-panel" id="carritoPanel">
  <h3>Carrito</h3>
  <div id="carritoItems"></div>
  <h4>Total: $<span id="total">0</span></h4>
  <button onclick="vaciarCarrito()">Vaciar carrito</button>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/5351421460" target="_blank" style="
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
">💬</a>

<script>

// 🔹 CARGAR PRODUCTOS
function cargarProductos() {

  let productos = JSON.parse(localStorage.getItem("em_productos")) || [];
  let contenedor = document.getElementById("productos");
  contenedor.innerHTML = "";

  let texto = busqueda.value.toLowerCase();
  let categoria = filtroCategoria.value.toLowerCase();
  let min = parseFloat(precioMin.value) || 0;
  let max = parseFloat(precioMax.value) || Infinity;

  let filtrados = productos.filter(p =>
    p.nombre.toLowerCase().includes(texto) &&
    p.categoria.toLowerCase().includes(categoria) &&
    p.precio >= min &&
    p.precio <= max
  );

  if (filtrados.length === 0) {
    contenedor.innerHTML = "<p>No hay productos</p>";
    return;
  }

  filtrados.forEach(p => {
    contenedor.innerHTML += `
      <div class="producto">
        <img src="${p.imagen}">
        <h4>${p.nombre}</h4>
        <p>${p.descCorta}</p>
        <b>$${p.precio}</b>
        <button onclick='agregarCarrito(${JSON.stringify(p)})'>
          Agregar al carrito
        </button>
      </div>
    `;
  });
}

// 🔹 CARRITO
function getCarrito() {
  return JSON.parse(localStorage.getItem("carrito")) || [];
}

function setCarrito(c) {
  localStorage.setItem("carrito", JSON.stringify(c));
}

function agregarCarrito(p) {
  let c = getCarrito();
  c.push(p);
  setCarrito(c);
  actualizarCarrito();
}

function eliminarItem(i) {
  let c = getCarrito();
  c.splice(i,1);
  setCarrito(c);
  actualizarCarrito();
}

function vaciarCarrito() {
  localStorage.removeItem("carrito");
  actualizarCarrito();
}

function actualizarCarrito() {
  let c = getCarrito();

  contador.innerText = c.length;

  let cont = document.getElementById("carritoItems");
  cont.innerHTML = "";

  let total = 0;

  c.forEach((p,i) => {
    total += p.precio;
    cont.innerHTML += `
      <div>
        ${p.nombre} - $${p.precio}
        <button onclick="eliminarItem(${i})">X</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function toggleCarrito() {
  let panel = document.getElementById("carritoPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

// 🔍 BUSCAR EN TIEMPO REAL
busqueda.addEventListener("input", cargarProductos);

// 🚀 INICIAR
cargarProductos();
actualizarCarrito();

</script>

</body>
</html>
