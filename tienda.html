<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElectroMarketHolguin</title>

<style>
body { margin:0; font-family:Arial; background:#f3f3f3; }

/* HEADER */
.header {
  display:flex;
  align-items:center;
  background:#131921;
  color:white;
  padding:10px;
}

.logo { font-size:18px; font-weight:bold; }

.search { flex:1; margin:0 10px; }

.search input { width:100%; padding:8px; }

.cart { cursor:pointer; }

/* FILTROS */
.filtros {
  background:white;
  padding:10px;
  display:none;
}

.filtros input {
  width:100%;
  padding:8px;
  margin:5px 0;
}

/* BOTON FILTRO */
.btn-filtro {
  width:100%;
  padding:10px;
  background:#ddd;
  border:none;
}

/* PRODUCTOS */
.productos {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.producto {
  background:white;
  padding:10px;
  border:1px solid #ddd;
}

.producto img {
  width:100%;
  height:150px;
  object-fit:cover;
}

/* CARRITO */
.carrito-panel {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:white;
  border-left:2px solid #ccc;
  padding:10px;
  overflow:auto;
  display:none;
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">ElectroMarketHolguin</div>

  <div class="search">
    <input type="text" id="busqueda" placeholder="Buscar productos...">
  </div>

  <div class="cart" onclick="toggleCarrito()">
    🛒 <span id="contador">0</span>
  </div>
</div>

<button class="btn-filtro" onclick="toggleFiltros()">☰ Filtros</button>

<div class="filtros" id="filtrosBox">
  <input type="text" id="filtroCategoria" placeholder="Categoría">
  <input type="number" id="precioMin" placeholder="Precio mínimo">
  <input type="number" id="precioMax" placeholder="Precio máximo">
  <button onclick="cargarProductos()">Filtrar</button>
</div>

<div class="productos" id="productos"></div>

<div class="carrito-panel" id="carritoPanel">
  <h3>Carrito</h3>
  <div id="carritoItems"></div>
  <h4>Total: $<span id="total">0</span></h4>
  <button onclick="vaciarCarrito()">Vaciar carrito</button>
</div>

<!-- MODAL PRODUCTO -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>

// 🔹 CARGAR PRODUCTOS (SOLO ARREGLO IMAGEN + OFERTA)
function cargarProductos() {

  let productos = JSON.parse(localStorage.getItem("em_productos")) || [];
  let contenedor = document.getElementById("productos");
  contenedor.innerHTML = "";

  let texto = busqueda.value.toLowerCase();
  let categoria = filtroCategoria.value.toLowerCase();
  let min = parseFloat(precioMin.value) || 0;
  let max = parseFloat(precioMax.value) || Infinity;

  let filtrados = productos.filter(p =>
    p.nombre.toLowerCase().includes(texto) &&
    p.categoria.toLowerCase().includes(categoria) &&
    p.precio >= min &&
    p.precio <= max
  );

  if (filtrados.length === 0) {
    contenedor.innerHTML = "<p>No hay productos</p>";
    return;
  }

  filtrados.forEach(p => {

    let precioFinal = (p.enOferta && p.precioOferta) ? p.precioOferta : p.precio;

    contenedor.innerHTML += `
      <div class="producto">
        <img src="${p.imagen ? p.imagen : 'https://via.placeholder.com/150'}">
        <h4>${p.nombre}</h4>
        <p>${p.descCorta}</p>
        <b>$${precioFinal}</b>

        <button onclick='verProducto(${JSON.stringify(p)})'>
          Ver producto
        </button>

        <button onclick='agregarCarrito(${JSON.stringify(p)})'>
          Agregar al carrito
        </button>
      </div>
    `;
  });
}

// 🔹 MODAL PRODUCTO (NUEVO)
function verProducto(p) {

  let precioFinal = (p.enOferta && p.precioOferta) ? p.precioOferta : p.precio;

  modalContent.innerHTML = `
    <h2>${p.nombre}</h2>
    <img src="${p.imagen ? p.imagen : 'https://via.placeholder.com/150'}" style="width:100%">
    <p>${p.descLarga}</p>
    <h3>$${precioFinal}</h3>
    <button onclick='agregarCarrito(${JSON.stringify(p)})'>Agregar</button>
    <button onclick='cerrarModal()'>Cerrar</button>
  `;

  modal.style.display = "flex";
}

function cerrarModal() {
  modal.style.display = "none";
}

// 🔹 CARRITO (ARREGLADO PARA OFERTA)
function getCarrito() {
  return JSON.parse(localStorage.getItem("carrito")) || [];
}

function setCarrito(c) {
  localStorage.setItem("carrito", JSON.stringify(c));
}

function agregarCarrito(p) {
  let c = getCarrito();
  c.push(p);
  setCarrito(c);
  actualizarCarrito();
}

function eliminarItem(i) {
  let c = getCarrito();
  c.splice(i,1);
  setCarrito(c);
  actualizarCarrito();
}

function vaciarCarrito() {
  localStorage.removeItem("carrito");
  actualizarCarrito();
}

function actualizarCarrito() {
  let c = getCarrito();

  contador.innerText = c.length;

  let cont = document.getElementById("carritoItems");
  cont.innerHTML = "";

  let total = 0;

  c.forEach((p,i) => {

    let precioFinal = (p.enOferta && p.precioOferta) ? p.precioOferta : p.precio;

    total += precioFinal;

    cont.innerHTML += `
      <div>
        ${p.nombre} - $${precioFinal}
        <button onclick="eliminarItem(${i})">X</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function toggleCarrito() {
  carritoPanel.style.display =
    carritoPanel.style.display === "block" ? "none" : "block";
}

// 🔹 FILTROS (NUEVO)
function toggleFiltros() {
  filtrosBox.style.display =
    filtrosBox.style.display === "block" ? "none" : "block";
}

// 🔍 BUSCAR
busqueda.addEventListener("input", cargarProductos);

// 🚀 INICIO
cargarProductos();
actualizarCarrito();

</script>

</body>
</html>
