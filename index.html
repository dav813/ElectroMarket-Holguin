<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ElectroMarket Holguín</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0; /* gris claro */
    }
    section {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }
    section img {
      width: 100%;
      height: auto;
      opacity: 0.9;
    }
    .overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #000;
      text-shadow: 1px 1px 3px #fff;
      width: 90%;
    }
    .overlay h1, .overlay h2 {
      font-size: 32px; /* letras más grandes */
      margin-bottom: 15px;
    }
    .overlay p {
      font-size: 20px; /* descripción más grande */
      margin-bottom: 20px;
    }
    button {
      background-color: #0066cc;
      color: white;
      border: none;
      padding: 20px 40px; /* botón más grande */
      font-size: 22px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover {
      background-color: #004c99;
    }
    .bottom {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
    }
