<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ElectroMarket Holguín</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', 'Arial', sans-serif;
      background: #0a1628;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.07);
      border-bottom: 1.5px solid rgba(200,168,75,0.4);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      flex-shrink: 0;
    }
    .header img {
      width: 38px; height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #c8a84b;
    }
    .header-nombre strong {
      display: block;
      font-size: 14px;
      font-weight: 900;
      color: #fff;
    }
    .header-nombre span {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
    }

    /* ── CUERPO PRINCIPAL ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 0;
      position: relative;
      overflow: hidden;
    }

    /* fondo degradado */
    .main::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0,68,170,0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(0,100,200,0.25) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── CONTENIDO CENTRAL ── */
    .centro {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 2;
      flex: 1;
      justify-content: center;
      gap: 10px;
    }

    .logo-marca {
      width: 72px; height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #c8a84b;
      box-shadow: 0 0 0 5px rgba(200,168,75,0.15), 0 8px 28px rgba(0,0,0,0.5);
    }

    .bienvenido {
      font-size: 13px;
      font-weight: 700;
      color: #c8a84b;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(22px, 6vw, 34px);
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
    }
    h1 span { color: #4d9fff; }

    .subtexto {
      font-size: clamp(13px, 3.5vw, 16px);
      color: rgba(255,255,255,0.65);
      max-width: 360px;
      line-height: 1.6;
    }

    /* ── IMÁGENES ── */
    .imgs-row {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      z-index: 2;
      width: 100%;
      max-width: 420px;
    }
    .img-wrap {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px 16px 0 0;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .img-wrap.tall { max-height: 130px; }
    .img-wrap.short { max-height: 110px; }
    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      mix-blend-mode: luminosity;
      opacity: 0.85;
    }

    /* ── BOTÓN ── */
    .btn-entrar {
      background: linear-gradient(135deg, #0077ee, #0044aa);
      color: #fff;
      border: none;
      padding: clamp(14px,3vw,18px) clamp(32px,8vw,56px);
      font-family: inherit;
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(0,100,220,0.5);
      transition: transform .2s, box-shadow .2s;
      z-index: 2;
      white-space: nowrap;
    }
    .btn-entrar:hover  { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(0,100,220,0.6); }
    .btn-entrar:active { transform: translateY(0); }

    /* ── PIE ── */
    .pie {
      z-index: 2;
      width: 100%;
      background: rgba(0,0,0,0.35);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .pie-contacto {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px 14px;
    }
    .pie-contacto span { white-space: nowrap; }
    .pie-links {
      font-size: 12px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pie-links a {
      color: #4d9fff;
      text-decoration: none;
      font-weight: 700;
      transition: color .2s;
    }
    .pie-links a:hover { color: #c8a84b; }

    /* ── RESPONSIVE ── */
    @media (max-height: 650px) {
      .logo-marca { width: 52px; height: 52px; }
      h1 { font-size: 20px; }
      .imgs-row { display: none; }
      .btn-entrar { padding: 12px 36px; font-size: 16px; }
    }
    @media (max-width: 360px) {
      h1 { font-size: 20px; }
      .subtexto { font-size: 13px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <img src="logo.jpg" alt="Logo ElectroMarket" onerror="this.src='https://placehold.co/38x38/0044aa/fff?text=EM'">
    <div class="header-nombre">
      <strong>ElectroMarket Holguín</strong>
      <span>Electrodomésticos de confianza</span>
    </div>
  </header>

  <!-- CUERPO -->
  <div class="main">

    <div class="centro">
      <img class="logo-marca" src="logo.jpg" alt="Logo" onerror="this.src='https://placehold.co/72x72/0044aa/fff?text=EM'">
      <p class="bienvenido">Bienvenido a</p>
      <h1>ElectroMarket<br><span>Holguín</span></h1>
      <p class="subtexto">Tu tienda online de electrodomésticos con confianza y comodidad, desde Holguín para toda Cuba.</p>
      <button class="btn-entrar" onclick="window.location.href='tienda.html'">Entrar a la tienda 🚀</button>
    </div>

    <!-- Imágenes decorativas pegadas al fondo -->
    <div class="imgs-row">
      <div class="img-wrap tall">
        <img src="carrito.jpg" alt="Carrito de compras">
      </div>
      <div class="img-wrap short">
        <img src="equipos.jpg" alt="Electrodomésticos">
      </div>
    </div>

  </div>

  <!-- PIE -->
  <footer class="pie">
    <div class="pie-contacto">
      <span>📞 +53 51421460</span>
      <span>📧 marcosdavidim2003@gmail.com</span>
      <span>📍 Holguín, Cuba</span>
    </div>
    <div class="pie-links">
      <a href="privacidad.html">🔒 Política de Privacidad</a>
      <a href="condiciones.html">📑 Términos y Condiciones</a>
    </div>
  </footer>

</body>
</html>
