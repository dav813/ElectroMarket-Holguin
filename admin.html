<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Tienda</title>

<style>
body { font-family: Arial; padding: 20px; background:#f4f4f4; }

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
}

button {
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}

.card {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>Panel Admin</h2>

<input id="nombre" placeholder="Nombre">
<input id="categoria" placeholder="Categoría">
<input id="precio" type="number" placeholder="Precio">
<input id="stock" type="number" placeholder="Stock">

<textarea id="descCorta" placeholder="Descripción corta"></textarea>
<textarea id="descLarga" placeholder="Descripción larga"></textarea>

<button onclick="guardarProducto()">Guardar producto</button>

<h3>Productos</h3>
<div id="lista"></div>

<script>

function obtenerProductos() {
  return JSON.parse(localStorage.getItem("em_productos")) || [];
}

// 🔥 GUARDAR PRODUCTO
function guardarProducto() {

  let productos = obtenerProductos();

  let nuevo = {
    id: crypto.randomUUID(), // 👈 mejor para futuro Supabase
    nombre: document.getElementById("nombre").value,
    categoria: document.getElementById("categoria").value,
    precio: Number(document.getElementById("precio").value),
    stock: Number(document.getElementById("stock").value),
    descCorta: document.getElementById("descCorta").value,
    descLarga: document.getElementById("descLarga").value,
    imagen: ""
  };

  productos.push(nuevo);

  localStorage.setItem("em_productos", JSON.stringify(productos));

  limpiar();
  mostrar();
}

// 🔥 MOSTRAR PRODUCTOS
function mostrar() {

  let productos = obtenerProductos();

  let cont = document.getElementById("lista");
  cont.innerHTML = "";

  productos.forEach((p, i) => {
    cont.innerHTML += `
      <div class="card">
        <b>${p.nombre}</b><br>
        ${p.categoria}<br>
        $${p.precio}<br>
        <button onclick="eliminar(${i})">Eliminar</button>
      </div>
    `;
  });
}

// 🔥 ELIMINAR
function eliminar(i) {

  let productos = obtenerProductos();
  productos.splice(i, 1);

  localStorage.setItem("em_productos", JSON.stringify(productos));

  mostrar();
}

// 🔥 LIMPIAR
function limpiar() {
  document.getElementById("nombre").value = "";
  document.getElementById("categoria").value = "";
  document.getElementById("precio").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("descCorta").value = "";
  document.getElementById("descLarga").value = "";
}

mostrar();

</script>

</body>
</html>
