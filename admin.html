<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Pro Inventario</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;}
header{background:#0044aa;color:white;padding:15px;text-align:center;font-weight:bold;}

.container{max-width:1100px;margin:auto;padding:15px;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}

input,textarea{width:100%;padding:10px;margin:5px 0 10px;border:1px solid #ddd;border-radius:6px;}

button{padding:8px 10px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
.btn-save{background:#0044aa;color:white;width:100%;}
.btn-edit{background:#ff9800;color:white;}
.btn-del{background:#e53935;color:white;}

table{width:100%;border-collapse:collapse;background:white;}
th{background:#0044aa;color:white;padding:10px;font-size:12px;text-align:left;}
td{padding:10px;font-size:13px;border-bottom:1px solid #eee;}

.estado-red{background:#b71c1c;color:white;}
.estado-green{background:#1b5e20;color:white;}
.estado-yellow{background:#f57f17;color:black;}
.estado-gray{background:#eeeeee;color:#555;}

.flex{display:flex;gap:8px;flex-wrap:wrap;}

.preview{border:1px solid #ddd;padding:10px;margin-top:10px;border-radius:10px;}
.preview img{width:100%;max-height:200px;object-fit:cover;}
.tag{background:red;color:white;padding:3px 6px;border-radius:5px;font-size:12px;display:inline-block;margin-top:5px;}
</style>
</head>

<body>

<header>📦 ADMIN PRO TOTAL</header>

<div class="container">

<div class="card" id="loginBox">
<h3>🔐 Login</h3>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<div id="panel" style="display:none">

<div class="card">
<h3>Producto</h3>

<input id="id" disabled placeholder="ID automático">
<input id="nombre" placeholder="Nombre">
<input id="categoria" placeholder="Categoría">
<input id="precio" type="number" placeholder="Precio">

<input id="descuento" type="number" placeholder="Descuento %">

<input id="stockInicial" type="number" placeholder="Stock inicial">
<input id="stockActual" type="number" placeholder="Stock disponible">

<input type="file" id="imagen">

<textarea id="descCorta" placeholder="Descripción corta"></textarea>
<textarea id="descLarga" placeholder="Descripción larga"></textarea>

<button onclick="preview()">👁 Vista previa</button>
<button class="btn-save" onclick="guardar()">💾 Guardar</button>

<div id="previewBox"></div>

</div>

<div class="card">
<h3>Inventario</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Stock</th>
<th>Disponible</th>
<th>Precio</th>
<th>Ventas</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<div class="card">
<h3>Historial de compras</h3>
<div id="historial"></div>
</div>

</div>

</div>

<script>

function login(){
if(user.value==="admin" && pass.value==="1234"){
loginBox.style.display="none";
panel.style.display="block";
}
}

function getProductos(){return JSON.parse(localStorage.getItem("em_productos"))||[];}
function saveProductos(d){localStorage.setItem("em_productos",JSON.stringify(d));}
function getCompras(){return JSON.parse(localStorage.getItem("em_compras"))||[];}

function generarID(){return "P"+Date.now();}
function ventas(id){return getCompras().filter(x=>x.productoId===id).length;}

function estado(p){
let v=ventas(p.id);
if(p.stockActual<=0)return "red";
if(p.stockActual<=p.stockInicial*0.3)return "yellow";
if(v>0)return "green";
return "gray";
}

function precioFinal(p){
if(p.descuento>0){
return p.precio-(p.precio*p.descuento/100);
}
return p.precio;
}

function getImg(){
let file=imagen.files[0];
if(!file)return Promise.resolve("");
return new Promise(res=>{
let reader=new FileReader();
reader.onload=e=>res(e.target.result);
reader.readAsDataURL(file);
});
}

async function guardar(){

let productos=getProductos();
let id=document.getElementById("id").value||generarID();

let img=await getImg();

let p={
id,
nombre:nombre.value,
categoria:categoria.value,
precio:parseFloat(precio.value),
descuento:parseInt(descuento.value||0),
stockInicial:parseInt(stockInicial.value),
stockActual:parseInt(stockActual.value),
descCorta:descCorta.value,
descLarga:descLarga.value,
imagen:img||""
};

productos=productos.filter(x=>x.id!==id);
productos.push(p);

saveProductos(productos);

alert("✅ Guardado");

limpiar();
render();
}

function preview(){

let imgPreview="";
let file=imagen.files[0];

if(file){
let reader=new FileReader();
reader.onload=e=>{
renderPreview(e.target.result);
};
reader.readAsDataURL(file);
}else{
renderPreview("");
}

function renderPreview(img){

previewBox.innerHTML=`

<div class="preview">

<img src="${img || 'https://via.placeholder.com/300'}">

<h2>${nombre.value}</h2>

<p>
${descuento.value>0 
? `<span style="text-decoration:line-through">$${precio.value}</span> 
<b>$${precio.value-(precio.value*descuento.value/100)}</b>
<span class="tag">OFERTA 🔥</span>`
: `$${precio.value}`
}
</p>

<p>${descCorta.value}</p>

<hr>

<h4>Vista completa:</h4>
<p>${descLarga.value}</p>

</div>

`;
}

}

function limpiar(){
document.querySelectorAll("input,textarea").forEach(x=>x.value="");
}

function edit(id){
let p=getProductos().find(x=>x.id===id);
Object.keys(p).forEach(k=>{
if(document.getElementById(k)) document.getElementById(k).value=p[k];
});
}

function del(id){
saveProductos(getProductos().filter(x=>x.id!==id));
render();
}

function render(){

let t=tabla;
t.innerHTML="";

getProductos().forEach(p=>{

let st=estado(p);

t.innerHTML+=`
<tr class="estado-${st}">
<td>${p.id}</td>
<td>${p.nombre}</td>
<td>${p.stockInicial}</td>
<td>${p.stockActual}</td>
<td>
${p.descuento>0 
? `<span style="text-decoration:line-through">$${p.precio}</span> 
<b>$${precioFinal(p)}</b>`
: `$${p.precio}`
}
</td>
<td>${ventas(p.id)}</td>
<td>${st}</td>
<td class="flex">
<button class="btn-edit" onclick="edit('${p.id}')">Editar</button>
<button class="btn-del" onclick="del('${p.id}')">Eliminar</button>
</td>
</tr>
`;
});

renderHistorial();
}

function renderHistorial(){
let h=historial;
h.innerHTML="";
getCompras().forEach(c=>{
h.innerHTML+=`<p>Compra: ${c.productoId} - ${c.fecha}</p>`;
});
}

render();

</script>

</body>
</html>
