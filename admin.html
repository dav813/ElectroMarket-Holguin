<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Seguro</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  margin: 0;
}

/* LOGIN */
#login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#0044aa,#0066cc);
}

.box {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 280px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #0044aa;
  color: white;
  border: none;
  cursor: pointer;
}

/* ADMIN */
#admin {
  display: none;
  padding: 20px;
}

.producto {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h3>Acceso Admin</h3>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">

<h2>Panel de productos</h2>

<input id="nombre" placeholder="Nombre">
<input id="categoria" placeholder="Categoría">
<input id="precio" type="number" placeholder="Precio">
<input id="stock" type="number" placeholder="Stock">
<textarea id="desc" placeholder="Descripción"></textarea>

<button onclick="guardar()">Guardar producto</button>

<h3>Lista</h3>
<div id="lista"></div>

</div>

<script>

/* 🔐 LOGIN SIMPLE */
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  // usuario y contraseña (puedes cambiarlos)
  if (u === "admin" && p === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "block";
    mostrar();
  } else {
    document.getElementById("error").innerText = "❌ Acceso incorrecto";
  }
}

/* 💾 GUARDAR PRODUCTO */
function guardar() {

  let productos = JSON.parse(localStorage.getItem("em_productos")) || [];

  let nuevo = {
    id: "P" + Date.now(),
    nombre: nombre.value,
    categoria: categoria.value,
    precio: parseFloat(precio.value),
    stock: parseInt(stock.value),
    descCorta: desc.value
  };

  productos.push(nuevo);

  localStorage.setItem("em_productos", JSON.stringify(productos));

  limpiar();
  mostrar();
}

/* 📦 MOSTRAR */
function mostrar() {
  let lista = document.getElementById("lista");
  let productos = JSON.parse(localStorage.getItem("em_productos")) || [];

  lista.innerHTML = "";

  productos.forEach((p, i) => {
    lista.innerHTML += `
      <div class="producto">
        <b>${p.nombre}</b><br>
        $${p.precio}<br>
        <button onclick="eliminar(${i})">Eliminar</button>
      </div>
    `;
  });
}

/* 🗑 ELIMINAR */
function eliminar(i) {
  let productos = JSON.parse(localStorage.getItem("em_productos")) || [];
  productos.splice(i,1);
  localStorage.setItem("em_productos", JSON.stringify(productos));
  mostrar();
}

/* 🧹 LIMPIAR */
function limpiar() {
  nombre.value = "";
  categoria.value = "";
  precio.value = "";
  stock.value = "";
  desc.value = "";
}

</script>

</body>
</html>
