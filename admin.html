<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Pro Inventario</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;}
header{background:#0044aa;color:white;padding:15px;text-align:center;font-weight:bold;}

.container{max-width:1100px;margin:auto;padding:15px;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}

input,textarea,select{width:100%;padding:10px;margin:5px 0 10px;border:1px solid #ddd;border-radius:6px;}

button{padding:8px 10px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
.btn-save{background:#0044aa;color:white;width:100%;}
.btn-edit{background:#ff9800;color:white;}
.btn-del{background:#e53935;color:white;}

table{width:100%;border-collapse:collapse;background:white;}
th{background:#0044aa;color:white;padding:10px;font-size:12px;text-align:left;}
td{padding:10px;font-size:13px;border-bottom:1px solid #eee;}

.estado-red{background:#ffebee;color:#c62828;}
.estado-green{background:#e8f5e9;color:#2e7d32;}
.estado-yellow{background:#fff8e1;color:#f9a825;}
.estado-gray{background:#f5f5f5;color:#555;}

.flex{display:flex;gap:8px;flex-wrap:wrap;}

.preview{border:1px solid #ddd;padding:10px;margin-top:10px;}
.preview img{max-width:100%;}
</style>
</head>

<body>

<header>📦 ADMIN PRO TOTAL</header>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>🔐 Login</h3>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<div id="panel" style="display:none">

<!-- FORM -->
<div class="card">
<h3>Producto</h3>

<input id="id" disabled placeholder="ID automático">
<input id="nombre" placeholder="Nombre">
<input id="categoria" placeholder="Categoría">
<input id="precio" type="number" placeholder="Precio">

<select id="oferta">
<option value="no">Sin oferta</option>
<option value="si">En oferta</option>
</select>

<input id="diasOferta" type="number" placeholder="Días oferta">

<input id="stockInicial" type="number" placeholder="Stock inicial">
<input id="stockActual" type="number" placeholder="Stock disponible">

<input type="file" id="imagen">

<textarea id="descCorta" placeholder="Descripción corta"></textarea>
<textarea id="descLarga" placeholder="Descripción larga"></textarea>

<button onclick="preview()">👁 Vista previa</button>
<button class="btn-save" onclick="guardar()">💾 Guardar</button>

<div id="previewBox"></div>

</div>

<!-- INVENTARIO -->
<div class="card">
<h3>Inventario</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Stock</th>
<th>Disponible</th>
<th>Precio</th>
<th>Ventas</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<!-- HISTORIAL -->
<div class="card">
<h3>Historial de compras</h3>
<div id="historial"></div>
</div>

</div>

</div>

<script>

// LOGIN SIMPLE
function login(){
if(document.getElementById("user").value==="admin" && document.getElementById("pass").value==="1234"){
document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";
}
}

// STORAGE
function getProductos(){return JSON.parse(localStorage.getItem("em_productos"))||[];}
function saveProductos(d){localStorage.setItem("em_productos",JSON.stringify(d));}
function getCompras(){return JSON.parse(localStorage.getItem("em_compras"))||[];}

// ID
function generarID(){return "P"+Date.now();}

// VENTAS
function ventas(id){return getCompras().filter(x=>x.productoId===id).length;}

// ESTADO
function estado(p){
let v=ventas(p.id);
if(p.stockActual<=0)return "red";
if(v===0)return "gray";
if(p.stockActual<=p.stockInicial*0.3)return "yellow";
return "green";
}

// IMAGEN BASE64
function getImg(){
let file=document.getElementById("imagen").files[0];
if(!file)return Promise.resolve("");
return new Promise(res=>{
let reader=new FileReader();
reader.onload=e=>res(e.target.result);
reader.readAsDataURL(file);
});
}

// GUARDAR
async function guardar(){

let productos=getProductos();
let id=document.getElementById("id").value||generarID();

let img=await getImg();

let p={
id,
nombre:nombre.value,
categoria:categoria.value,
precio:parseFloat(precio.value),
oferta:oferta.value,
diasOferta:parseInt(diasOferta.value||0),
stockInicial:parseInt(stockInicial.value),
stockActual:parseInt(stockActual.value),
descCorta:descCorta.value,
descLarga:descLarga.value,
imagen:img||""
};

productos=productos.filter(x=>x.id!==id);
productos.push(p);

saveProductos(productos);
limpiar();
render();
}

// PREVIEW
function preview(){
previewBox.innerHTML=`
<div class="preview">
<h2>${nombre.value}</h2>
<p>${descCorta.value}</p>
<p><b>$${precio.value}</b></p>
</div>`;
}

// LIMPIAR
function limpiar(){
document.querySelectorAll("input,textarea").forEach(x=>x.value="");
}

// EDIT
function edit(id){
let p=getProductos().find(x=>x.id===id);
Object.keys(p).forEach(k=>{
if(document.getElementById(k)) document.getElementById(k).value=p[k];
});
}

// DELETE
function del(id){
saveProductos(getProductos().filter(x=>x.id!==id));
render();
}

// RENDER INVENTARIO
function render(){

let t=document.getElementById("tabla");
t.innerHTML="";

getProductos().forEach(p=>{

let st=estado(p);

t.innerHTML+=`
<tr class="estado-${st}">
<td>${p.id}</td>
<td>${p.nombre}</td>
<td>${p.stockInicial}</td>
<td>${p.stockActual}</td>
<td>$${p.precio}</td>
<td>${ventas(p.id)}</td>
<td>${st}</td>
<td class="flex">
<button class="btn-edit" onclick="edit('${p.id}')">Editar</button>
<button class="btn-del" onclick="del('${p.id}')">Eliminar</button>
</td>
</tr>
`;

});

renderHistorial();
}

// HISTORIAL
function renderHistorial(){
let h=document.getElementById("historial");
h.innerHTML="";
getCompras().forEach(c=>{
h.innerHTML+=`<p>Compra: ${c.productoId} - ${c.fecha}</p>`;
});
}

render();

</script>

</body>
</html>
