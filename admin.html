<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Tienda</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}

/* LOGIN */
#login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#0044aa,#0066cc);
}

.box {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 280px;
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 10px;
  background: #0044aa;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 8px;
}

/* ADMIN */
#admin {
  display: none;
  padding: 15px;
}

.producto {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h3>Acceso Admin</h3>

    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">

<h2>Panel de productos</h2>

<input id="nombre" placeholder="Nombre">
<input id="categoria" placeholder="Categoría">
<input id="precio" type="number" placeholder="Precio">
<input id="stock" type="number" placeholder="Stock">
<textarea id="desc" placeholder="Descripción"></textarea>

<button onclick="guardar()">Guardar producto</button>

<h3>Productos</h3>
<div id="lista"></div>

</div>

<script>

/// 🔐 LOGIN CORREGIDO
function login() {
  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value.trim();

  if (u === "admin" && p === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "block";
    mostrar();
  } else {
    document.getElementById("error").innerText = "❌ Usuario o contraseña incorrectos";
  }
}

/// 💾 GUARDAR PRODUCTO
function guardar() {

  let productos = JSON.parse(localStorage.getItem("em_productos")) || [];

  const nuevo = {
    id: "P" + Date.now(),
    nombre: document.getElementById("nombre").value.trim(),
    categoria: document.getElementById("categoria").value.trim(),
    precio: parseFloat(document.getElementById("precio").value),
    stock: parseInt(document.getElementById("stock").value),
    descCorta: document.getElementById("desc").value.trim()
  };

  productos.push(nuevo);

  localStorage.setItem("em_productos", JSON.stringify(productos));

  limpiar();
  mostrar();
}

/// 📦 MOSTRAR PRODUCTOS
function mostrar() {

  let lista = document.getElementById("lista");
  let productos = JSON.parse(localStorage.getItem("em_productos")) || [];

  lista.innerHTML = "";

  productos.forEach((p, i) => {
    lista.innerHTML += `
      <div class="producto">
        <b>${p.nombre}</b><br>
        ${p.categoria}<br>
        $${p.precio}<br>
        <button onclick="eliminar(${i})">Eliminar</button>
      </div>
    `;
  });
}

/// 🗑 ELIMINAR
function eliminar(i) {
  let productos = JSON.parse(localStorage.getItem("em_productos")) || [];
  productos.splice(i, 1);
  localStorage.setItem("em_productos", JSON.stringify(productos));
  mostrar();
}

/// 🧹 LIMPIAR
function limpiar() {
  document.getElementById("nombre").value = "";
  document.getElementById("categoria").value = "";
  document.getElementById("precio").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("desc").value = "";
}

</script>

</body>
</html>
